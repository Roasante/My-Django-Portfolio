{% load static %}
<!DOCTYPE html>
<html>
<head>
   <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/logo.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/logo.png' %}">
    <title>
        {% block title %}
        Welcome To My Portfolio
        {% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    
    <!-- StyleSheet-->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>


<body>
<div class="background-slider">

    <div class="bg-slide active"
         style="background-image:url('/static/images/backgrounds/defaultback.png')">
    </div>

    <div class="bg-slide"
         style="background-image:url('/static/images/backgrounds/telecom1.jpg')">
    </div>

    <div class="bg-slide"
         style="background-image:url('/static/images/backgrounds/telecom2.jpg')">
    </div>

    <div class="bg-slide"
         style="background-image:url('/static/images/backgrounds/telecom3.jpg')">
    </div>

    <div class="bg-slide"
         style="background-image:url('/static/images/backgrounds/telecom4.jpg')">
    </div>

</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            My Portfolio
        </a>

        <div>
            <a class="btn btn-outline-primary" href="{% url 'home' %}">
                Home
            </a>

            <a class="btn btn-outline-primary" href="{% url 'about' %}">
                About
            </a>

            <a class="btn btn-outline-primary" href="{% url 'contact' %}">
                Contact
            </a>

            <a class="btn btn-outline-primary" href="{% url 'experience' %}">
                Experience
            </a>

            <a class="btn btn-outline-primary" href="{% url 'projects' %}">
                Projects
            </a>

        </div>

    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<!-- WHATSAPP FLOAT BUTTON -->
<a href="https://wa.me/233596186047"
   class="whatsapp-float"
   target="_blank">

    <i class="fa-brands fa-whatsapp"></i>

</a>

<!-- FOOTER -->
<div class="footer">

    <p class="mb-1">
        © 2026 <strong>Richmond Obeng Asante</strong>
    </p>

    

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    AOS.init({
        duration: 900,
        once: true
    });
</script>
</body>
</html>
